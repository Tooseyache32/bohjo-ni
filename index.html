<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroMap</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="preloader" id="preloader">
        <div class="loader-ring"></div>
        <div class="loader-text">ИНИЦИАЛИЗАЦИЯ КОСМОСА</div>
        <div class="loader-percent" id="loaderPercent">0%</div>
    </div>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <video class="video-bg" id="videoBg" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-1610-large.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <div class="stars" id="stars"></div>
    <div class="nebula nebula-1" id="nebula1"></div>
    <div class="nebula nebula-2" id="nebula2"></div>

    <header class="header">
        <h1>AstroMap</h1>
        <p class="subtitle">Интерактивная карта космоса</p>
    </header>

    <nav class="nav">
        <a href="index.html" class="nav-link">Солнечная система</a>
        <a href="index2.html" class="nav-link">Галактики</a>
        <a href="#" class="nav-link">Контакты</a>
        <a href="index3.html" class="nav-link">О проекте</a>
    </nav>

    <div class="solar-system" id="solarSystem">
        <div class="sun" data-name="Солнце" data-type="Звезда" data-temp="5,500°C"
            data-desc="Сверхмассивная звезда в центре системы"></div>

        <div class="orbit orbit-mercury" data-speed="4s">
            <div class="planet mercury" data-name="Меркурий" data-type="Планета" data-temp="167°C"
                data-desc="Ближайшая к Солнцу планета"></div>
        </div>
        <div class="orbit orbit-venus" data-speed="7s">
            <div class="planet venus" data-name="Венера" data-type="Планета" data-temp="464°C"
                data-desc="Самая горячая планета"></div>
        </div>
        <div class="orbit orbit-earth" data-speed="10s">
            <div class="planet earth" data-name="Земля" data-type="Планета" data-temp="15°C" data-desc="Наш дом"></div>
        </div>
        <div class="orbit orbit-mars" data-speed="15s">
            <div class="planet mars" data-name="Марс" data-type="Планета" data-temp="-65°C" data-desc="Красная планета">
            </div>
        </div>
        <div class="orbit orbit-jupiter" data-speed="25s">
            <div class="planet jupiter" data-name="Юпитер" data-type="Газовый гигант" data-temp="-110°C"
                data-desc="Крупнейшая планета"></div>
        </div>
        <div class="orbit orbit-saturn" data-speed="35s">
            <div class="planet saturn" data-name="Сатурн" data-type="Газовый гигант" data-temp="-140°C"
                data-desc="Планета с кольцами"></div>
        </div>
        <div class="orbit orbit-uranus" data-speed="45s">
            <div class="planet uranus" data-name="Уран" data-type="Ледяной гигант" data-temp="-195°C"
                data-desc="Вращается на боку"></div>
        </div>
        <div class="orbit orbit-neptune" data-speed="55s">
            <div class="planet neptune" data-name="Нептун" data-type="Ледяной гигант" data-temp="-200°C"
                data-desc="Самый ветреный мир"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
